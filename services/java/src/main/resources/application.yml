server:
  port: 4300
  error:
    include-stacktrace: never

spring:
  application:
    name: blog-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:blogdb}
    username: ${DB_USER:bloguser}
    password: ${DB_PASSWORD:blogpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  auth:
    admin-password: ${ADMIN_PASSWORD:admin}
    token-ttl-hours: ${TOKEN_TTL_HOURS:168}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true # 需启用以注册 swagger-config，Knife4j doc.html 依赖此端点

knife4j:
  enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    com.blog: ${LOG_LEVEL:INFO}
    org.springframework.web: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOGGING:false}
    org.hibernate.type.descriptor.sql.BasicBinder: ${SQL_LOGGING:false}
    org.hibernate.type.descriptor.sql.BasicExtractor: ${SQL_LOGGING:false}
    org.springframework.jdbc: ${SQL_LOGGING:false}
