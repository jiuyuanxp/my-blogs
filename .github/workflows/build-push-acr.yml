# 在 GitHub amd64 环境构建并推送到阿里云 ACR
# 解决 Mac 本地构建 QEMU 崩溃（SIGABRT）问题
name: Build and Push to ACR

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

env:
  REGISTRY: crpi-znbxd9etb7oxa8ft.cn-chengdu.personal.cr.aliyuncs.com
  NAMESPACE: jiuyaun
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-nginx:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
