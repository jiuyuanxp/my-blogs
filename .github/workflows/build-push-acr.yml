# 在 GitHub amd64 环境构建并推送到阿里云 ACR
# 路径过滤：仅 web/admin 相关改动时触发，按需构建对应镜像
name: Build and Push to ACR

on:
  push:
    branches: [main]
    paths:
      # 应用与后端
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'services/java/**'
      #  infra：仅 Docker/Nginx 配置，排除 README 等文档
      - 'infra/docker/**'
      - 'infra/nginx/**'
      # 共享包（web/admin 依赖）
      - 'packages/**'
      # 不包含：package.json、pnpm-lock.yaml、pnpm-workspace.yaml
      # 根 package.json 仅 devDependencies/scripts，修改不触发部署
      # 依赖变更通常伴随 apps/packages 变更，会由对应路径触发
  workflow_dispatch: # 手动触发时构建全部

env:
  REGISTRY: crpi-znbxd9etb7oxa8ft.cn-chengdu.personal.cr.aliyuncs.com
  NAMESPACE: jiuyaun
  IMAGE_TAG: ${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      java: ${{ steps.filter.outputs.java }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - "apps/web/**"
              - "packages/**"
            admin:
              - "apps/admin/**"
              - "infra/nginx/**"
            java:
              - "services/java/**"
              - "infra/docker/Dockerfile.java"

  build-nginx:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-nginx:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-web:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-java:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push java
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.java
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-java:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blogs-java:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
