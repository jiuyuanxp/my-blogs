# Phase 2: web + admin + java + postgres + redis
# 在项目根目录执行：pnpm docker:build && pnpm docker:up
# 或：docker compose -f infra/docker/docker-compose.yml build
#     docker compose -f infra/docker/docker-compose.yml up -d

name: blogs

services:
  nginx:
    image: blogs-nginx:latest
    pull_policy: never # 仅用本地镜像，从 ACR 手动拉取
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.nginx
    ports:
      - '80:80'
    depends_on:
      - web
      - java
    restart: unless-stopped

  web:
    image: blogs-web:latest
    pull_policy: never # 仅用本地镜像，从 ACR 手动拉取
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_BASE_PATH=/web
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: blogs-postgres
    ports:
      - '5433:5432' # 宿主机 5433，避免与本地其他 PostgreSQL 冲突
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blogpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bloguser -d blogdb']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blogs-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  java:
    image: blogs-java:latest
    pull_policy: never # 仅用本地镜像，从 ACR 手动拉取
    container_name: blogs-java
    environment:
      SPRING_PROFILES_ACTIVE: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: blogdb
      DB_USER: bloguser
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
