# 博客 web + admin + api - Phase 2 配置
# /admin 静态，/web 反向代理到 Next.js，/api 反向代理到 Java

# Gzip 压缩（http 级）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/x-javascript;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/blogs_access.log;
    error_log /var/log/nginx/blogs_error.log;

    # 安全 Header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # admin 静态（basePath /admin）
    location = /admin {
        return 302 /admin/;
    }
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }

    # API 反向代理到 Java
    location /api/ {
        proxy_pass http://java:4300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /doc.html {
        proxy_pass http://java:4300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v3/api-docs {
        proxy_pass http://java:4300;
        proxy_set_header Host $host;
    }
    # Knife4j 静态资源（webjars）
    location /webjars/ {
        proxy_pass http://java:4300;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # web（Next.js basePath /web）
    location /web {
        proxy_pass http://web:3000;
        # Next.js 静态资源长期缓存（含 hash）
        location ~ ^/web/_next/static/ {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 根路径重定向
    location = / {
        return 302 /web/zh;
    }
}
